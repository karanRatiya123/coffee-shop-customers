<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online | The Velvet Roast</title>
    <meta name="description" content="Online ordering is brewing. Skip the line and pick up your favorites soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow-y: auto;
            height: auto;
            min-height: 100vh;
            background-color: var(--bg-primary);
        }
        .stub {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 1.5rem 4rem;
        }
        .stub-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 460px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .stub-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            background: var(--accent-gold-glow);
            border: 1px solid rgba(201, 157, 102, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-gold);
        }
        .stub-icon svg { width: 36px; height: 36px; }
        .stub-card h2 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--text-primary);
            margin: 0.75rem 0 0.75rem;
            line-height: 1.25;
        }
        .stub-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 300;
        }
        .stub-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="home.html" class="logo-wrapper" aria-label="The Velvet Roast — Home">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17 8h1a4 4 0 1 1 0 8h-1" />
                <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z" />
                <line x1="6" y1="1" x2="6" y2="4" />
                <line x1="10" y1="1" x2="10" y2="4" />
                <line x1="14" y1="1" x2="14" y2="4" />
            </svg>
            <span class="logo-text">Velvet Roast</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
            <a href="home.html" class="nav-link">Home</a>
            <a href="menu.html" class="nav-link">Menu</a>
            <a href="order.html" class="nav-link active">Order</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="home.html#location" class="nav-link">Location</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>
        <a href="index.html" class="header-cta">Sign In</a>
    </header>

    <main class="stub">
        <div class="stub-card">
            <div class="stub-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
                </svg>
            </div>
            <span class="brand-tag">Coming Soon</span>
            <h2>Online ordering is brewing.</h2>
            <p>We're polishing our ordering experience. Soon you'll be able to skip the line and pick up your favorites in minutes.</p>
            <div class="stub-actions">
                <a href="home.html" class="submit-btn">
                    <span class="btn-text">Back to Home</span>
                    <span class="btn-glow"></span>
                    <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"/>
                        <path d="m12 5 7 7-7 7"/>
                    </svg>
                </a>
            </div>
        </div>
    </main>
    <script src="auth.js"></script>
</body>
</html>
